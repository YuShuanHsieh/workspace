# Single-node kind cluster for the ext-authz demo.
# extraPortMappings expose the per-namespace ingressgateways on UNPRIVILEGED
# host ports (works on macOS Docker Desktop AND Linux Docker without root):
#   localhost:8080 → documents-ingressgateway NodePort 30080 → documents-api
#   localhost:8081 → wiki-ingressgateway      NodePort 30081 → wiki-api
#   localhost:8443 → reserved for future TLS upgrade
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: ext-authz-demo
nodes:
- role: control-plane
  kubeadmConfigPatches:
  - |
    kind: InitConfiguration
    nodeRegistration:
      kubeletExtraArgs:
        node-labels: "ingress-ready=true"
  extraPortMappings:
  - containerPort: 30080
    hostPort: 8080
    protocol: TCP
  - containerPort: 30081
    hostPort: 8081
    protocol: TCP
  - containerPort: 30443
    hostPort: 8443
    protocol: TCP
