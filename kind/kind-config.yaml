# Single-node kind cluster for the ext-authz demo.
# extraPortMappings expose the per-namespace ingressgateways on host ports:
#   localhost:80   → documents-ingressgateway NodePort 30080 → documents-api
#   localhost:8081 → wiki-ingressgateway      NodePort 30081 → wiki-api
#   localhost:443  → reserved for future TLS upgrade
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: ext-authz-demo
nodes:
- role: control-plane
  kubeadmConfigPatches:
  - |
    kind: InitConfiguration
    nodeRegistration:
      kubeletExtraArgs:
        node-labels: "ingress-ready=true"
  extraPortMappings:
  - containerPort: 30080
    hostPort: 80
    protocol: TCP
  - containerPort: 30081
    hostPort: 8081
    protocol: TCP
  - containerPort: 30443
    hostPort: 443
    protocol: TCP
