# istiod chart — Istio control plane (pilot)
# Vendored at: kind/charts/istiod-1.24.2.tgz
# Chart name:    istiod
# Chart version: 1.24.2
#
# Container images deployed by this chart:
#   - docker.io/istio/pilot:1.24.2
#
# Override the registry/tag below if pulling from a private mirror.
# The chart resolves the pilot image as: global.hub + "/" + pilot.image + ":" + global.tag
# (i.e. docker.io/istio/pilot:1.24.2). These values match the chart's own defaults
# and are written here explicitly for transparency.

global:
  hub: docker.io/istio
  tag: 1.24.2

pilot:
  # Sized for kind on a MacBook (chart default is ~500m CPU / 2048Mi memory)
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 512Mi
  autoscaleEnabled: false
  replicaCount: 1
