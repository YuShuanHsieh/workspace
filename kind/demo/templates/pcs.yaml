apiVersion: apps/v1
kind: Deployment
metadata:
  name: pcs
  namespace: documents
  labels:
    app: pcs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pcs
  template:
    metadata:
      labels:
        app: pcs
    spec:
      containers:
      - name: pcs
        image: "{{ include "extAuthz.image.pcs" . }}"
        imagePullPolicy: {{ .Values.images.pcs.pullPolicy }}
        ports:
        - containerPort: 8080
        env:
        - name: PORT
          value: "8080"
        resources:
          requests:
            cpu: {{ .Values.resources.app.requests.cpu }}
            memory: {{ .Values.resources.app.requests.memory }}
          limits:
            cpu: {{ .Values.resources.app.limits.cpu }}
            memory: {{ .Values.resources.app.limits.memory }}
        readinessProbe:
          tcpSocket:
            port: 8080
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: pcs
  namespace: documents
  labels:
    app: pcs
spec:
  type: ClusterIP
  selector:
    app: pcs
  ports:
  - name: http
    port: 8080
    targetPort: 8080
