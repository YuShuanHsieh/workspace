apiVersion: apps/v1
kind: Deployment
metadata:
  name: wiki-api
  namespace: wiki
  labels:
    app: wiki-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wiki-api
  template:
    metadata:
      labels:
        app: wiki-api
        {{ include "extAuthz.optInLabel" . }}
      annotations:
        {{- include "extAuthz.sidecarAnnotations" . | nindent 8 }}
    spec:
      containers:
      - name: wiki-api
        image: "{{ include "extAuthz.image.echoServer" . }}"
        imagePullPolicy: {{ .Values.images.echoServer.pullPolicy }}
        ports:
        - containerPort: 8080
        env:
        - name: PORT
          value: "8080"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        resources:
          requests:
            cpu: {{ .Values.resources.app.requests.cpu }}
            memory: {{ .Values.resources.app.requests.memory }}
          limits:
            cpu: {{ .Values.resources.app.limits.cpu }}
            memory: {{ .Values.resources.app.limits.memory }}
        readinessProbe:
          tcpSocket:
            port: 8080
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: wiki-api
  namespace: wiki
  labels:
    app: wiki-api
spec:
  type: ClusterIP
  selector:
    app: wiki-api
  ports:
  - name: http
    port: 8080
    targetPort: 8080
