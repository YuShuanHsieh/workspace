apiVersion: v2
name: ext-authz-demo
description: Umbrella chart for the ext-authz kind demo (per-namespace EnvoyFilter pattern). Single point to swap container registry / tag for private-registry deployments — see values.yaml.
type: application
version: 0.1.0
appVersion: "1.24.2"
# No subchart dependencies declared.
#
# Istio (istio-base, istiod, gateway) is installed by setup.sh as separate
# Helm releases — wrapping them as subchart dependencies of this umbrella
# would conflict with the istio-base install (overlapping ServiceAccounts /
# CRDs across charts) and would force every Istio resource into the umbrella's
# single Helm release namespace, which doesn't work for the per-namespace
# gateways.
#
# What this chart owns:
#   - All app Kubernetes manifests (Deployments, Services, EnvoyFilters,
#     Gateway/VirtualService CRDs) under templates/.
#   - The single values.yaml that setup.sh ALSO reads to drive the Istio
#     installs — so registry/tag/resource overrides remain centralised.
