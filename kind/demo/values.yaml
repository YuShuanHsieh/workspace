# ===========================================================================
# CONTAINER IMAGE OVERRIDES — swap these for a private registry / company use.
# Every container image touched by this demo (app + Istio) is referenced from
# THIS BLOCK. One image = one line. To override for company use:
#   1. Edit the line for the image you want to redirect.
#   2. Re-run ./kind/setup.sh (idempotent).
#
# Where each image lands:
#   echoServer       → documents-api, documents-search, wiki-api (sidecar-injected)
#   pcs              → permission-checking service (ext_authz callee)
#   dashboardClient  → in-cluster request driver loop
#   istio            → hub:tag pair used by istio-base, istiod, and BOTH ingressgateways
#                      (no image-name suffix — chart appends pilot, proxyv2, etc.)
#
# Kind node image is NOT in this file — see kind/kind-config.yaml.
# ===========================================================================
images:
  pullPolicy: IfNotPresent
  echoServer:      workspace/echo-server:dev       # ← override for company use
  pcs:             workspace/pcs:dev               # ← override for company use
  dashboardClient: workspace/dashboard-client:dev  # ← override for company use
  istio:           docker.io/istio:1.24.2          # ← override for company use (hub:tag)

# ===========================================================================
# RESOURCE FOOTPRINT — sized for a MacBook (every value can be raised in prod).
# ===========================================================================
resources:
  app:
    requests: { cpu: 10m,  memory: 32Mi }
    limits:   { cpu: 100m, memory: 64Mi }
  caller:
    requests: { cpu: 5m,   memory: 16Mi }
    limits:   { cpu: 50m,  memory: 32Mi }
  ingressgateway:
    requests: { cpu: 20m,  memory: 64Mi }
    limits:   { cpu: 200m, memory: 128Mi }
  sidecar:
    proxyCPU: "10m"
    proxyMemory: "64Mi"
    proxyCPULimit: "200m"
    proxyMemoryLimit: "128Mi"

# ===========================================================================
# EXT-AUTHZ WIRING — both EnvoyFilters call this PCS service.
# ===========================================================================
extAuthz:
  optInLabel:
    key: workspace.io/ext-authz
    value: enabled
  pcsService:
    host: pcs.documents.svc.cluster.local
    port: 8080
    pathPrefix: /check

# Headers PCS returns on allow get appended to the original request before
# the app sees it. The EnvoyFilter template hardcodes the list below;
# changing it requires editing the template. Listed here so the values.yaml
# is self-documenting.
extAuthzMutation:
  injectedHeaders:
  - x-user-id
  - x-user-role
  - x-allowed-scopes

# ===========================================================================
# INGRESS GATEWAYS — installed separately by setup.sh (subchart-namespace
# limitation; see README.md).
#
# Two of these fields ARE consumed by templates in this chart:
#   - .name → gateway-selector label on Gateway/VirtualService templates
#   - .host → host match on Gateway/VirtualService templates
#
# The other fields (namespace, nodePort) and the gateway pod's resources are
# hardcoded as --set flags in setup.sh because the gateway Helm chart is
# installed separately, not as a subchart of this umbrella. If you change a
# value here that's also in setup.sh (namespace, nodePort, resources), update
# BOTH places — they do not auto-sync.
# ===========================================================================
gateways:
  documents:
    namespace: documents
    name: documents-ingressgateway
    nodePort: 30080
    host: documents.local
  wiki:
    namespace: wiki
    name: wiki-ingressgateway
    nodePort: 30081
    host: wiki.local
