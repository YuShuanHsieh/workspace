apiVersion: apps/v1
kind: Deployment
metadata:
  name: pcs
  namespace: documents
  labels:
    app: pcs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pcs
  template:
    metadata:
      labels:
        app: pcs
        # PCS is the decision service itself; deliberately NO workspace.io/ext-authz label.
      annotations:
        sidecar.istio.io/proxyCPU: "10m"
        sidecar.istio.io/proxyMemory: "64Mi"
        sidecar.istio.io/proxyCPULimit: "200m"
        sidecar.istio.io/proxyMemoryLimit: "128Mi"
    spec:
      containers:
      - name: pcs
        image: workspace/pcs:dev
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        - name: PORT
          value: "8080"
        resources:
          requests: { cpu: 10m, memory: 32Mi }
          limits:   { cpu: 100m, memory: 64Mi }
        readinessProbe:
          tcpSocket:
            port: 8080
          periodSeconds: 5
