apiVersion: apps/v1
kind: Deployment
metadata:
  name: pcs
  namespace: documents
  labels:
    app: pcs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pcs
  template:
    metadata:
      labels:
        app: pcs
        # PCS is the decision service itself; deliberately NO workspace.io/ext-authz label.
    spec:
      containers:
      - name: pcs
        image: workspace/pcs:dev
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        env:
        - name: PORT
          value: "8080"
        resources:
          requests: { cpu: 50m, memory: 64Mi }
          limits:   { cpu: 200m, memory: 128Mi }
        readinessProbe:
          tcpSocket:
            port: 8080
          periodSeconds: 5
