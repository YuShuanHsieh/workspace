# Helm values for documents-ingressgateway.
name: documents-ingressgateway
labels:
  istio: documents-ingressgateway

service:
  type: NodePort
  ports:
  - name: status-port
    port: 15021
    targetPort: 15021
  - name: http2
    port: 80
    targetPort: 80
    nodePort: 30080
  - name: https
    port: 443
    targetPort: 443
    nodePort: 30443

resources:
  requests: { cpu: 20m,  memory: 64Mi }
  limits:   { cpu: 200m, memory: 128Mi }

autoscaling:
  enabled: false
