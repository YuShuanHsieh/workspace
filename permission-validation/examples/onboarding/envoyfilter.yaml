apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: permission-validation-orders-app
  namespace: orders
spec:
  workloadSelector:
    labels:
      app: orders-app
  configPatches:

  # (a) STATIC cluster for the pv sibling container at 127.0.0.1.
  - applyTo: CLUSTER
    match:
      context: SIDECAR_INBOUND
    patch:
      operation: ADD
      value:
        name: pv_sidecar
        type: STATIC
        connect_timeout: 1s
        typed_extension_protocol_options:
          envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
            "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
            explicit_http_config:
              http2_protocol_options: {}
        load_assignment:
          cluster_name: pv_sidecar
          endpoints:
            - lb_endpoints:
                - endpoint:
                    address:
                      socket_address: { address: 127.0.0.1, port_value: 50051 }

  # (b) Insert ext_proc before the router in the inbound HCM.
  - applyTo: HTTP_FILTER
    match:
      context: SIDECAR_INBOUND
      listener:
        filterChain:
          filter:
            name: envoy.filters.network.http_connection_manager
            subFilter:
              name: envoy.filters.http.router
    patch:
      operation: INSERT_BEFORE
      value:
        name: envoy.filters.http.ext_proc
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExternalProcessor
          grpc_service:
            envoy_grpc: { cluster_name: pv_sidecar }
          failure_mode_allow: false
          processing_mode:
            request_header_mode: SEND
            response_header_mode: SKIP
            request_body_mode: NONE
            response_body_mode: NONE
            request_trailer_mode: SKIP
            response_trailer_mode: SKIP

  # (c) Probe-path carve-out: disable ext_proc for liveness/readiness paths.
  - applyTo: VIRTUAL_HOST
    match:
      context: SIDECAR_INBOUND
    patch:
      operation: MERGE
      value:
        routes:
          - match: { path: "/healthz" }
            typed_per_filter_config:
              envoy.filters.http.ext_proc:
                "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExtProcPerRoute
                disabled: true
          - match: { path: "/readyz" }
            typed_per_filter_config:
              envoy.filters.http.ext_proc:
                "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExtProcPerRoute
                disabled: true
          - match: { path: "/livez" }
            typed_per_filter_config:
              envoy.filters.http.ext_proc:
                "@type": type.googleapis.com/envoy.extensions.filters.http.ext_proc.v3.ExtProcPerRoute
                disabled: true
