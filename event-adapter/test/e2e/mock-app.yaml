addr: 0.0.0.0:18080

handlers:
  - method: POST
    path: /events/task-created
    requireHeaders:
      - X-Workspace-Actor-Id
    requireCookies:
      - session
    response:
      status: 200
      contentType: application/json
      body: '{"ok":true}'
  - method: POST
    path: /requests/upload-presign
    response:
      status: 200
      contentType: application/json
      body: '{"uploadId":"up-1","url":"https://example-bucket.s3/put?sig=abc"}'
