app:
  id: task-service
  httpBaseURL: http://127.0.0.1:18080
nats:
  url: nats://nats:4222
  stream: workspace-events
  durableConsumer: task-service-dispatcher
  filterSubject: t.tenant-a.app.task.event.created
  workerPoolSize: 16
  fetchBatch: 16
  ackWait: 30s
  maxDeliver: 5
  maxAckPending: 1024
  defaultDLQSubject: dlq.tenant-a.task-service
routes:
  - name: task-created
    match:
      subject: t.tenant-a.app.task.event.created
      type: com.workspace.task.created
      source: workspace/task
    dispatch:
      method: POST
      path: /events/task-created
      timeout: 2s
      forwardHeaders:
        - X-Workspace-Actor-Id
        - X-Workspace-Tenant-Id
    response:
      type: com.workspace.task.created.processed
      source: task-service
      subject: t.tenant-a.app.task.event.processed
    retry:
      maxAttempts: 3
      initialBackoff: 100ms
      maxBackoff: 2s
    dlq:
      subject: dlq.tenant-a.task-service
  - name: task-created-redirect
    match:
      subject: t.tenant-a.app.task.event.created
      type: com.workspace.task.created.redirect
      source: workspace/task
    dispatch:
      method: POST
      path: /events/redirect-me
      timeout: 2s
      forwardHeaders:
        - X-Workspace-Actor-Id
    response:
      type: com.workspace.task.created.redirect.processed
      source: task-service
      subject: t.tenant-a.app.task.event.processed.redirect
    retry:
      maxAttempts: 3
      initialBackoff: 100ms
      maxBackoff: 2s
    dlq:
      subject: dlq.tenant-a.task-service
  - name: task-template
    match:
      subject: t.tenant-a.app.task.event.created
      type: com.workspace.task.template
    dispatch:
      method: POST
      path: /api/tasks/{taskId}/complete
      timeout: 2s
      forwardHeaders:
        - X-Workspace-Actor-Id
    response:
      type: com.workspace.task.template.processed
      source: task-service
      subject: t.tenant-a.app.task.event.processed.template
    retry:
      maxAttempts: 3
      initialBackoff: 100ms
      maxBackoff: 2s
    dlq:
      subject: dlq.tenant-a.task-service
requests:
  subject: q.tenant-a.app.uploads.request
  queueGroup: upload-responders
  workerPoolSize: 8
  directDispatch:
    enabled: true
    timeout: 3s
    allowedPathPrefixes:
      - /requests/orders/
  routes:
    - name: upload-presign
      match:
        type: com.workspace.uploads.presign.request
      dispatch:
        method: POST
        path: /requests/upload-presign
        timeout: 3s
      reply:
        source: upload-service
        type: com.workspace.uploads.presign.reply
    - name: redirect-request
      match:
        type: com.workspace.redirect.request
      dispatch:
        method: POST
        path: /events/redirect-me
        timeout: 3s
      reply:
        source: task-service
        type: com.workspace.redirect.reply
observability:
  environment: testing
