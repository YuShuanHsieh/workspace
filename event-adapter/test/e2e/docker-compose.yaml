services:
  nats:
    image: nats:2.11
    command: ["-js", "-sd", "/data"]
    ports:
      - "4222:4222"

  # Creates the JetStream stream before the event-adapter starts.
  nats-setup:
    image: natsio/nats-box:latest
    depends_on: [nats]
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until nc -z nats 4222 2>/dev/null; do
          echo "waiting for nats..." && sleep 1
        done
        nats stream add workspace-events \
          --server nats://nats:4222 \
          --subjects "t.tenant-a.app.task.event.created,t.tenant-a.app.task.event.processed,dlq.tenant-a.task-service" \
          --storage file \
          --retention limits \
          --discard old \
          --max-msgs=-1 \
          --max-bytes=-1 \
          --max-age=0s \
          --replicas=1 \
          2>/dev/null && echo "stream created" || echo "stream already exists"

  mock-app:
    build:
      context: ../..
      dockerfile: test/e2e/Dockerfile.mock-app
    ports:
      - "18080:18080"
    volumes:
      - ./mock-app.yaml:/config/mock-app.yaml:ro
    command: ["--config", "/config/mock-app.yaml"]

  event-adapter:
    build:
      context: ../..
      dockerfile: test/e2e/Dockerfile.event-adapter
    volumes:
      - ./routes.yaml:/config/routes.yaml:ro
    command: ["--config", "/config/routes.yaml"]
    depends_on:
      nats-setup:
        condition: service_completed_successfully
      mock-app:
        condition: service_started
