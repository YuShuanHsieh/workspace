# NATS server configuration for local development
# Enables JetStream, WebSocket, and the HTTP monitoring endpoint.

# JetStream — durable streams and consumers
jetstream {
  store_dir: /data
  max_mem: 256MB
  max_file: 1GB
}

# HTTP monitoring (http://localhost:8222)
http_port: 8222

# WebSocket — lets browser/WS clients connect on port 4223
# Use ws://localhost:4223 from JavaScript / nats.ws
websocket {
  port: 4223
  no_tls: true
}
