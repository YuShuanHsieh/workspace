services:

  # ─── NATS server ────────────────────────────────────────────────────────────
  # Port 4222  — NATS client (Go / CLI)
  # Port 4223  — WebSocket client (browser / nats.ws)
  # Port 8222  — HTTP monitoring dashboard  http://localhost:8222
  nats:
    image: nats:2.11
    ports:
      - "4222:4222"
      - "4223:4223"
      - "8222:8222"
    volumes:
      - ./nats-server.conf:/etc/nats/nats-server.conf:ro
      - nats-data:/data
    command: ["-c", "/etc/nats/nats-server.conf"]
    healthcheck:
      test: ["CMD", "nats-server", "--help"]
      interval: 2s
      retries: 10

  # ─── JetStream bootstrap ────────────────────────────────────────────────────
  # One-shot container that creates the default streams.
  # Re-run manually after changing stream config:
  #   docker compose run --rm nats-setup
  nats-setup:
    image: natsio/nats-box:latest
    depends_on:
      nats:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        SERVER=nats://nats:4222

        echo "==> waiting for NATS..."
        until nats server ping --server $$SERVER 2>/dev/null; do sleep 1; done

        # ── workspace-events stream ──────────────────────────────────────────
        # Catches all application events and DLQ subjects.
        # Subjects follow the pattern:
        #   events.<tenant>.<service>.<noun>.<verb>  — inbound events
        #   events.<tenant>.<service>.processed.*    — response events
        #   dlq.<tenant>.<service>                   — dead-letter queue
        #
        # Customise the --subjects list to match your own naming scheme.
        nats stream add workspace-events \
          --server $$SERVER \
          --subjects "events.>,dlq.>" \
          --storage file \
          --retention limits \
          --discard old \
          --max-msgs=-1 \
          --max-bytes=-1 \
          --max-age=0s \
          --replicas=1 \
          --defaults \
          2>/dev/null \
          && echo "stream 'workspace-events' created" \
          || echo "stream 'workspace-events' already exists"

        echo "==> JetStream bootstrap complete"
        echo ""
        echo "Streams:"
        nats stream ls --server $$SERVER

  # ─── event-adapter ──────────────────────────────────────────────────────────
  # Forwards NATS events to your app running on the host machine.
  # Set EVENT_ADAPTER_IMAGE before running: export EVENT_ADAPTER_IMAGE=<image>
  event-adapter:
    image: ${EVENT_ADAPTER_IMAGE:?Set EVENT_ADAPTER_IMAGE to the event-adapter image path}
    extra_hosts:
      # Allows the container to reach your app on the host machine.
      # On Linux this maps host.docker.internal → the Docker bridge gateway.
      # On Docker Desktop (Mac / Windows) this mapping is already present.
      - "host.docker.internal:host-gateway"
    volumes:
      - ./event-adapter.yaml:/config/event-adapter.yaml:ro
    command: ["--config", "/config/event-adapter.yaml"]
    depends_on:
      nats-setup:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  nats-data:
