<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Event Adapter Flow</title>
    <style>
      :root { color-scheme: light; font-family: Inter, ui-sans-serif, system-ui, sans-serif; background: #f4f7fb; color: #162235; }
      body { margin: 0; }
      main { margin: 0 auto; max-width: 1240px; padding: clamp(1rem, 4vw, 4rem); }
      .eyebrow { color: #1769d1; font-size: .78rem; font-weight: 800; letter-spacing: .1em; margin: 0 0 .5rem; text-transform: uppercase; }
      h1 { font-size: clamp(1.7rem, 4vw, 3rem); letter-spacing: -.045em; margin: 0 0 .75rem; }
      .intro { color: #5d6c80; line-height: 1.55; margin: 0 0 2rem; max-width: 62ch; }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Event Adapter</p>
      <h1>Request flow</h1>
      <p class="intro">Follow one correlated request from its caller through the platform and into the application.</p>
      <event-flow config-url="/config.json" request-id="req-demo-001"></event-flow>
    </main>
    <script type="module" src="/event-flow.js"></script>
  </body>
</html>
